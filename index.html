<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogoKavling — Kavling Tanah Pilihan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="index">

  <div id="navbar-placeholder"></div>

  <section class="hero">
    <div class="container">
      <h1>Temukan kavling tanah pilihan Anda</h1>
      <p>Lokasi strategis, legalitas jelas, siap dibandingkan sebelum Anda putuskan.</p>

      <form class="hero-search" onsubmit="submitHeroSearch(event)">
        <select id="heroLokasi">
          <option value="">Semua lokasi</option>
        </select>
        <select id="heroStatus">
          <option value="">Semua status</option>
          <option value="tersedia">Tersedia</option>
          <option value="terjual">Terjual</option>
        </select>
        <button type="submit" class="btn btn-primary">Cari Kavling</button>
      </form>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 style="margin-bottom:24px;">Kavling unggulan</h2>
      <div class="grid-kavling" id="featuredGrid">
        <p class="text-muted">Memuat kavling...</p>
      </div>
      <div style="text-align:center; margin-top:32px;">
        <a href="kavling.html" class="btn btn-secondary">Lihat semua kavling</a>
      </div>
    </div>
  </section>

  <section class="section" style="background:var(--color-primary); color:#fff; text-align:center;">
    <div class="container">
      <h2 style="color:#fff; margin-bottom:8px;">Tertarik salah satu kavling?</h2>
      <p style="color:rgba(255,255,255,0.8); margin-bottom:20px;">Tim kami siap membantu Anda menemukan kavling yang tepat.</p>
      <a href="kontak.html" class="btn btn-whatsapp">Hubungi Kami Sekarang</a>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="js/data.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/components.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
